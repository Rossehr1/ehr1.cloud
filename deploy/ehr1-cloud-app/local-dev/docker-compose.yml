# Web: site root from ../ehr1-cloud-site-root + app at /ehr1-data/ (matches production).
# Port: EHR1_LOCAL_WEB_PORT (default 8080). From this folder: docker compose up --build
# See README.md in this folder.

services:
  db:
    image: mysql:8.0
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootlocal
      MYSQL_DATABASE: ehr1_local
      MYSQL_USER: ehr1
      MYSQL_PASSWORD: ehr1local
    ports:
      - "3307:3306"
    volumes:
      - ehr1_local_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootlocal"]
      interval: 6s
      timeout: 5s
      retries: 12
      start_period: 20s

  web:
    build: .
    ports:
      - "${EHR1_LOCAL_WEB_PORT:-8080}:80"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # Same layout as production: site root (HTML) + php app in /ehr1-data/
      - ../../ehr1-cloud-site-root:/var/www/html
      - ../:/var/www/html/ehr1-data
      - ../../../sql/mysql:/var/www/html/ehr1-data/sql/mysql:ro

volumes:
  ehr1_local_mysql:
