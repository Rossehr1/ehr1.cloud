# Dedicated HTTP vhost for ehr1.cloud (files deployed to /var/www/ehr1.cloud/public_html).
# Hostinger VPS default server returns 444 for unknown Host headers — without this block,
# curl/browser requests for ehr1.cloud never reach your deployed tree.
#
# Install (root on VPS), then: nginx -t && systemctl reload nginx
#   cp nginx-ehr1.cloud-dedicated.conf /etc/nginx/sites-available/ehr1.cloud.conf
#   ln -sf /etc/nginx/sites-available/ehr1.cloud.conf /etc/nginx/sites-enabled/ehr1.cloud.conf
#
# HTTPS: add certificates (panel or certbot) and duplicate this server for listen 443 ssl;
# until then, http://ehr1.cloud works if DNS points at this server.

server {
  listen 80;
  listen [::]:80;
  # Browsers opening http://177.7.52.88/ send Host: 177.7.52.88 — list it or they hit the panel default (empty reply / 444).
  server_name ehr1.cloud www.ehr1.cloud 177.7.52.88;

  root /var/www/ehr1.cloud/public_html;
  index index.php index.html;

  access_log /var/log/nginx/ehr1.cloud.access.log;
  error_log  /var/log/nginx/ehr1.cloud.error.log;

  location = /ehr1-data {
    return 301 /ehr1-data/;
  }

  location / {
    try_files $uri $uri/ =404;
  }

  location ~ \.php$ {
    include fastcgi_params;
    fastcgi_intercept_errors on;
    fastcgi_index index.php;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    try_files $uri =404;
    fastcgi_read_timeout 3600;
    fastcgi_send_timeout 3600;
    fastcgi_param HTTPS "";
    fastcgi_param SERVER_PORT 80;
    fastcgi_pass 127.0.0.1:15001;
    fastcgi_param PHP_VALUE "error_log=/home/user/logs/php/error.log;
memory_limit=512M;
max_execution_time=60;
max_input_time=60;
max_input_vars=10000;
post_max_size=64M;
upload_max_filesize=64M;
date.timezone=UTC;
display_errors=off;";
  }

  location ~ /\.ht {
    deny all;
  }
}
